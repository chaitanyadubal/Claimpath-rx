services:
  - type: web
    name: medbenefit-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: BAAI/bge-m3
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
    healthCheckPath: /health
